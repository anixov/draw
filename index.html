<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FastDraw Web</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #808080;
}

#canvas {
  touch-action: none;
  display: block;
}

#slider {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: rotate(-90deg) translateY(-50%);
  transform-origin: right top;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<input id="slider" type="range" min="1" max="700" value="20">

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;

  ctx.fillStyle = "#808080";
  ctx.fillRect(0, 0, width, height);
}
resize();
window.addEventListener("resize", resize);

ctx.imageSmoothingEnabled = false;

let drawing = false;
let lastPoint = null;

let brushSize = 20;
let isErasing = false;

const strokes = [];
let currentStroke = null;
let redoStack = [];

const slider = document.getElementById("slider");
slider.oninput = () => brushSize = slider.value;

// 🔲 Draw pixel-sharp circle
function drawCircle(x, y, size, erase) {
  ctx.fillStyle = erase ? "#808080" : "#000000";
  ctx.beginPath();
  ctx.arc(Math.round(x), Math.round(y), size/2, 0, Math.PI*2);
  ctx.fill();
}

// ✏️ Interpolation
function interpolate(x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const dist = Math.hypot(dx, dy);

  const step = Math.max(1, brushSize * 0.25);
  const steps = Math.floor(dist / step);

  for (let i = 0; i <= steps; i++) {
    const t = i / (steps || 1);
    drawCircle(x1 + dx*t, y1 + dy*t, brushSize, isErasing);

    currentStroke.points.push({
      x: x1 + dx*t,
      y: y1 + dy*t
    });
  }
}

// 🖊 Pointer events (Apple Pencil works)
canvas.addEventListener("pointerdown", e => {
  drawing = true;
  lastPoint = {x: e.clientX, y: e.clientY};

  currentStroke = {
    points: [],
    size: brushSize,
    erase: isErasing
  };

  redoStack = [];
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;

  const p = {x: e.clientX, y: e.clientY};

  interpolate(lastPoint.x, lastPoint.y, p.x, p.y);

  lastPoint = p;
});

canvas.addEventListener("pointerup", () => {
  drawing = false;
  strokes.push(currentStroke);

  if (strokes.length > 40) strokes.shift();
});

// ⌨️ Toggle brush/eraser
window.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "x") {
    isErasing = !isErasing;
  }

  if (e.metaKey && e.key === "z") undo();
  if (e.metaKey && e.key === "y") redo();
});

// 🔄 Undo / Redo
function redraw() {
  ctx.fillStyle = "#808080";
  ctx.fillRect(0, 0, width, height);

  for (const s of strokes) {
    for (const p of s.points) {
      drawCircle(p.x, p.y, s.size, s.erase);
    }
  }
}

function undo() {
  if (!strokes.length) return;
  redoStack.push(strokes.pop());
  redraw();
}

function redo() {
  if (!redoStack.length) return;
  strokes.push(redoStack.pop());
  redraw();
}

// 👆 Touch gestures (approximation)
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 2) undo();
  if (e.touches.length === 3) redo();
});
</script>

</body>
</html>
