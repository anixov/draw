<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Draw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #808080; touch-action: none; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; image-rendering: pixelated; image-rendering: crisp-edges; }
  #toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    background: rgba(0,0,0,0.55);
    border-radius: 40px;
    padding: 8px 16px;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    z-index: 10;
  }
  .tool-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    background: none;
    padding: 0;
  }
  .tool-btn.active { border-color: #fff; }
  .tool-btn svg { pointer-events: none; }
  #sizer {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #sizer input[type=range] {
    writing-mode: vertical-lr;
    direction: rtl;
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    width: 28px;
    height: 180px;
    cursor: pointer;
    accent-color: #fff;
    opacity: 0.7;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="sizer">
  <input type="range" id="slider" min="1" max="64" value="1" step="1">
</div>
<div id="toolbar">
  <button class="tool-btn active" id="btn-draw" title="Draw" aria-label="Draw">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 19L7.5 14.5M7.5 14.5L16.5 5.5C17.3 4.7 18.5 4.7 19.3 5.5C20.1 6.3 20.1 7.5 19.3 8.3L10.3 17.3L7.5 14.5Z" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="tool-btn" id="btn-erase" title="Erase" aria-label="Erase">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="10" width="10" height="8" rx="1" stroke="white" stroke-width="1.6"/>
      <path d="M3 18h16M13 10l6-6M13 14l6-6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('c');
  // desynchronized: true — bypasses the browser compositor, draws directly to screen
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  ctx.imageSmoothingEnabled = false;

  const DRAW = 0, ERASE = 1;
  let tool = DRAW;
  let dpr = 1;
  // Independent size per tool (in CSS pixels)
  const sizes = [1, 1];
  const slider = document.getElementById('slider');

  // Work entirely in device pixels — no ctx transform, no scale()
  // Convert CSS coords to device pixels inline (single multiply, no matrix math)
  function resize() {
    dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth, h = window.innerHeight;
    const pw = Math.round(w * dpr), ph = Math.round(h * dpr);
    const saved = (canvas.width > 0 && canvas.height > 0)
      ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
    canvas.width  = pw;
    canvas.height = ph;
    // No ctx.scale() — identity transform, draw at raw device pixels
    ctx.fillStyle = '#808080';
    ctx.fillRect(0, 0, pw, ph);
    if (saved) ctx.putImageData(saved, 0, 0);
    setColor();
  }

  // Cache fillStyle — only change it on tool switch, not per stroke
  function setColor() {
    ctx.fillStyle = tool === DRAW ? '#000000' : '#808080';
  }

  // Bresenham in device pixels, drawing sz×sz squares
  function line(x0, y0, x1, y1) {
    const sz = Math.max(1, Math.round(sizes[tool] * dpr));
    const off = sz >> 1; // offset to centre the square on the cursor
    x0 = Math.round(x0 * dpr) - off; y0 = Math.round(y0 * dpr) - off;
    x1 = Math.round(x1 * dpr) - off; y1 = Math.round(y1 * dpr) - off;
    const dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
    const dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
    let err = dx + dy;
    while (true) {
      ctx.fillRect(x0, y0, sz, sz);
      if (x0 === x1 && y0 === y1) break;
      const e2 = 2 * err;
      if (e2 >= dy) { err += dy; x0 += sx; }
      if (e2 <= dx) { err += dx; y0 += sy; }
    }
  }

  let lastX = 0, lastY = 0, isDown = false;

  function pointerDown(e) {
    if (e.pointerType === 'touch') return;
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    isDown = true;
    lastX = e.clientX; lastY = e.clientY;
    const sz = Math.max(1, Math.round(sizes[tool] * dpr));
    const off = sz >> 1;
    ctx.fillRect(Math.round(lastX * dpr) - off, Math.round(lastY * dpr) - off, sz, sz);
  }

  function pointerMove(e) {
    if (!isDown) return;
    e.preventDefault();
    const evts = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ev of evts) {
      line(lastX, lastY, ev.clientX, ev.clientY);
      lastX = ev.clientX; lastY = ev.clientY;
    }
  }

  function pointerUp(e) {
    if (e.pointerType === 'touch') return;
    isDown = false;
  }

  canvas.addEventListener('pointerdown',   pointerDown, { passive: false });
  canvas.addEventListener('pointermove',   pointerMove, { passive: false });
  canvas.addEventListener('pointerup',     pointerUp,   { passive: false });
  canvas.addEventListener('pointercancel', pointerUp,   { passive: false });

  function switchTool(t) {
    tool = t;
    setColor();
    slider.value = sizes[tool];
    document.getElementById('btn-draw').classList.toggle('active', tool === DRAW);
    document.getElementById('btn-erase').classList.toggle('active', tool === ERASE);
  }

  document.getElementById('btn-draw').addEventListener('pointerdown', e => {
    e.stopPropagation(); switchTool(DRAW);
  });
  document.getElementById('btn-erase').addEventListener('pointerdown', e => {
    e.stopPropagation(); switchTool(ERASE);
  });

  slider.addEventListener('input', () => {
    sizes[tool] = parseInt(slider.value, 10);
  });
  // Prevent slider interaction from reaching the canvas
  slider.addEventListener('pointerdown', e => e.stopPropagation());
  slider.addEventListener('pointermove', e => e.stopPropagation());

  document.addEventListener('contextmenu',  e => e.preventDefault());
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange',e => e.preventDefault());

  window.addEventListener('resize', resize);
  resize();
})();
</script>

</body>
</html>
