<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FastDraw WebGL</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #808080;
}
canvas {
  display: block;
}
#slider {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: rotate(-90deg) translateY(-50%);
}
</style>
</head>
<body>

<canvas id="glcanvas"></canvas>
<input id="slider" type="range" min="1" max="700" value="20">

<script>
const canvas = document.getElementById("glcanvas");
const gl = canvas.getContext("webgl");

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  gl.viewport(0, 0, width, height);
}
window.addEventListener("resize", resize);
resize();

// 🔲 Shaders
const vs = `
attribute vec2 a_pos;
uniform vec2 u_resolution;
void main() {
  vec2 zeroToOne = a_pos / u_resolution;
  vec2 clip = zeroToOne * 2.0 - 1.0;
  gl_Position = vec4(clip * vec2(1,-1), 0, 1);
}
`;

const fs = `
precision mediump float;
uniform vec2 u_center;
uniform float u_radius;
uniform vec4 u_color;

void main() {
  float d = distance(gl_FragCoord.xy, u_center);
  if (d > u_radius) discard;
  gl_FragColor = u_color;
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl.VERTEX_SHADER, vs));
gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(program);
gl.useProgram(program);

// 🔧 Locations
const posLoc = gl.getAttribLocation(program, "a_pos");
const resLoc = gl.getUniformLocation(program, "u_resolution");
const centerLoc = gl.getUniformLocation(program, "u_center");
const radiusLoc = gl.getUniformLocation(program, "u_radius");
const colorLoc = gl.getUniformLocation(program, "u_color");

// 🧱 Buffer
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

// 🎨 Clear
function clear() {
  gl.clearColor(0.5, 0.5, 0.5, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
}
clear();

// 🧠 State
let brushSize = 20;
let isErasing = false;

let strokes = [];
let currentStroke = null;
let redoStack = [];

const slider = document.getElementById("slider");
slider.oninput = () => brushSize = parseFloat(slider.value);

// 🔲 Draw circle (GPU)
function drawCircle(x, y, size, erase) {
  const r = size / 2;

  const verts = new Float32Array([
    x-r, y-r,
    x+r, y-r,
    x-r, y+r,
    x-r, y+r,
    x+r, y-r,
    x+r, y+r,
  ]);

  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STREAM_DRAW);

  gl.uniform2f(resLoc, width, height);
  gl.uniform2f(centerLoc, x, height - y);
  gl.uniform1f(radiusLoc, r);

  if (erase) {
    gl.uniform4f(colorLoc, 0.5, 0.5, 0.5, 1);
  } else {
    gl.uniform4f(colorLoc, 0, 0, 0, 1);
  }

  gl.drawArrays(gl.TRIANGLES, 0, 6);
}

// ✏️ Interpolation
function interpolate(x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const dist = Math.hypot(dx, dy);

  const step = Math.max(1, brushSize * 0.25);
  const steps = Math.floor(dist / step);

  for (let i = 0; i <= steps; i++) {
    const t = i / (steps || 1);
    const x = x1 + dx*t;
    const y = y1 + dy*t;

    drawCircle(x, y, brushSize, isErasing);

    currentStroke.points.push({x, y});
  }
}

// 🖊 Input
let drawing = false;
let last = null;

canvas.addEventListener("pointerdown", e => {
  drawing = true;
  last = {x: e.clientX, y: e.clientY};

  currentStroke = {
    points: [],
    size: brushSize,
    erase: isErasing
  };

  redoStack = [];
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;

  const p = {x: e.clientX, y: e.clientY};
  interpolate(last.x, last.y, p.x, p.y);
  last = p;
});

canvas.addEventListener("pointerup", () => {
  drawing = false;
  strokes.push(currentStroke);
  if (strokes.length > 40) strokes.shift();
});

// 🔄 Undo / Redo
function redraw() {
  clear();

  for (const s of strokes) {
    for (const p of s.points) {
      drawCircle(p.x, p.y, s.size, s.erase);
    }
  }
}

function undo() {
  if (!strokes.length) return;
  redoStack.push(strokes.pop());
  redraw();
}

function redo() {
  if (!redoStack.length) return;
  strokes.push(redoStack.pop());
  redraw();
}

// ⌨️ Controls
window.addEventListener("keydown", e => {
  if (e.key === "x") isErasing = !isErasing;
  if (e.metaKey && e.key === "z") undo();
  if (e.metaKey && e.key === "y") redo();
});

// 👆 Touch gestures
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 2) undo();
  if (e.touches.length === 3) redo();
});
</script>

</body>
</html>
